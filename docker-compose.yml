services:
  backend:
    build: ./backend        # Points to the backend folder
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=http://localhost:5173

  frontend:
    build: ./frontend       # Points to the frontend folder
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
